function fmt(usd, cur) {
  const ghs = (usd * USD_TO_GHS).toFixed(2);
  if (cur === "USD") return `$${usd.toFixed(2)}`;
  if (cur === "GHS") return `GH₵${ghs}`;
  return `$${usd.toFixed(2)} · GH₵${ghs}`;
}

function toKobo(usd) {
  return Math.round(usd * USD_TO_GHS * 100);
}

function OfferBanner({ onClose }) {

    const i = setInterval(() => setT(p => p > 0 ? p-1 : 0), 1000);
    return () => clearInterval(i);
  }, []);
  const h = String(Math.floor(t/3600)).padStart(2,"0");
  const m = String(Math.floor((t%3600)/60)).padStart(2,"0");
  const s = String(t%60).padStart(2,"0");
